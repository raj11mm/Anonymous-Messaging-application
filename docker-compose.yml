services:
  mongo:
    image: mongo:7
    container_name: whisperbox-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whisperbox-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/anonymous_messages
      JWT_SECRET: super_secret_change_me
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whisperbox-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:5000/api

volumes:
  mongo-data:
